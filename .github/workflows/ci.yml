name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @dfsync/client lint

      - name: Test
        run: pnpm --filter @dfsync/client test

      - name: Build
        run: pnpm --filter @dfsync/client build
